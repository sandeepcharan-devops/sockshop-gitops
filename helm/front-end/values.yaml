replicaCount: 1

image:
  repository: vipparlasandeepcharan/front-end
  tag: "v1.14"
  pullPolicy: Always

service:
  type: NodePort
  port: 80
  targetPort: 8079

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 5
